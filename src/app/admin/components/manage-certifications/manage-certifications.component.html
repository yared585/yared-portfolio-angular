<div class="section-header">
  <h1>Certifications</h1>
  <button class="btn btn-primary" (click)="openAdd()">+ Add</button>
</div>

<p class="success-msg" *ngIf="message && !isError">{{ message }}</p>
<p class="error-msg"   *ngIf="message && isError">{{ message }}</p>

<div class="form-panel" *ngIf="showForm">
  <h3>{{ editingId ? 'Edit Certification' : 'Add Certification' }}</h3>
  <div class="form-row">
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input [(ngModel)]="form.icon" name="icon" placeholder="e.g. 📊" />
    </div>
    <div class="form-group">
      <label>Name</label>
      <input [(ngModel)]="form.name" name="name" placeholder="e.g. Data Science Certificate" />
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Issuer</label>
      <input [(ngModel)]="form.issuer" name="issuer" placeholder="e.g. Udemy" />
    </div>
    <div class="form-group">
      <label>Year</label>
      <input [(ngModel)]="form.year" name="year" placeholder="e.g. 2024" />
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" (click)="save()">{{ editingId ? 'Update' : 'Save' }}</button>
    <button class="btn btn-ghost"   (click)="cancel()">Cancel</button>
  </div>
</div>

<div class="card-list">
  <div class="item-card" *ngFor="let item of items">
    <div class="item-info">
      <div class="item-title">{{ item.icon }} {{ item.name }}</div>
      <div class="item-sub">{{ item.issuer }} — {{ item.year }}</div>
    </div>
    <div class="item-actions">
      <button class="btn btn-ghost"  (click)="openEdit(item)">Edit</button>
      <button class="btn btn-danger" (click)="delete(item._id!)">Delete</button>
    </div>
  </div>
</div>
